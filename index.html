<!-- 文档声明HTML5规范 -->
<!DOCTYPE html>
<!-- 网页根标签，语言中文 -->
<html lang="zh-CN">
<head>
  <!-- 字符编码UTF-8，中文不乱码 -->
  <meta charset="UTF-8" />
  <!-- 移动端自适应，禁止缩放屏幕 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <!-- 网页标题 -->
  <title>黑底爱心电子相册</title>
  <!-- 引入hammer手势库：实现拖拽、左右滑动 -->
  <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
  <style>
    /* 全局初始化：清除默认边距，统一盒模型 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    /* 页面整体黑色背景，高度铺满屏幕，隐藏横向溢出 */
    body {
      background: #000;
      min-height: 100vh;
      overflow-x: hidden;
    }
    /* 音乐播放器固定右上角，最高层级不被遮挡 */
    .audio-wrap {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 999;
    }
    /* 播放器宽度+粉色发光阴影 */
    audio {
      width: 180px;
      filter: drop-shadow(0 0 8px #ff69b4);
    }
    /* 修改播放器控制面板底色 */
    audio::-webkit-media-controls-panel {
      background: #222;
    }
    /* 播放器时间文字粉色 */
    audio::-webkit-media-controls-current-time-display,
    audio::-webkit-media-controls-time-remaining-display {
      color: #ff69b4;
    }

    /* 相册盒子：页面居中，自适应手机宽度，超出部分隐藏 */
    .album-box {
      width: 92%;
      max-width: 700px;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      overflow: hidden;
      border: 2px solid #ff69b4;
      border-radius: 12px;
      box-shadow: 0 0 25px #ff69b455;
    }
    /* 图片横向排列，过渡动画用于切换/回弹 */
    .img-list {
      display: flex;
      transition: transform 0.6s ease;
    }
    /* 单张图片占满容器宽度，图片不变形裁切 */
    .img-list img {
      width: 100%;
      flex-shrink: 0;
      display: block;
      object-fit: cover;
    }
    /* 左右切换按钮样式 */
    .prev, .next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: #ff69b488;
      color: #fff;
      border: none;
      font-size: 26px;
      padding: 8px 12px;
      cursor: pointer;
      z-index: 10;
    }
    .prev {left: 6px;}
    .next {right: 6px;}

    /* 爱心样式：不阻挡鼠标点击，不能选中文字 */
    .heart {
      position: absolute;
      pointer-events: none;
      user-select: none;
      color: #ff69b4;
      z-index: 1;
    }
  </style>
</head>
<body>
  <!-- 右上角音乐播放器，自动循环播放 -->
  <div class="audio-wrap">
    <audio controls autoplay loop id="bgMusic">
      <source src="http://music.163.com/song/media/outer/url?id=1811941177.mp3" type="audio/mpeg">
    
  </div>

  <!-- 相册容器 -->
  <div class="album-box">
    <button class="prev">&lt;</button>
    <button class="next">&gt;</button>
    <div class="img-list" id="slider">
      <img src="https://picsum.photos/id/237/800/500" alt="相册">
      <img src="https://picsum.photos/id/128/800/500" alt="相册">
      <img src="https://picsum.photos/id/36/800/500" alt="相册">
      <img src="https://picsum.photos/id/96/800/500" alt="相册">
    </div>
  </div>

<script>
// 获取轮播容器
const slider = document.getElementById('slider');
// 获取全部图片
const imgs = slider.querySelectorAll('img');
// 获取左右按钮
const prev = document.querySelector('.prev');
const next = document.querySelector('.next');
// 当前图片下标
let index = 0;
// 图片总数量
const total = imgs.length;
// 容器宽度（单页宽度）
let wrapWidth = slider.offsetWidth;
// 拖拽临界值：拖动超过页面30%才翻页，不足回弹
const dragThreshold = wrapWidth * 0.3;

// 切换图片统一方法
function changeSlide(offset = 0) {
  slider.style.transition = 'transform 0.6s ease';
  slider.style.transform = `translateX(${offset - index * wrapWidth}px)`;
}

// 点击下一张
next.onclick = () => {
  index = (index + 1) % total;
  changeSlide();
};
// 点击上一张
prev.onclick = () => {
  index = (index - 1 + total) % total;
  changeSlide();
};
// 自动轮播4.5s切换
setInterval(() => {
  index = (index + 1) % total;
  changeSlide();
}, 4500);

// ====== 拖拽+回弹核心逻辑 ======
const hammer = new Hammer(slider);
// 开启拖拽识别
hammer.get('pan').set({ direction: Hammer.DIRECTION_HORIZONTAL });
let dragX = 0; // 实时拖拽偏移值

// 拖拽进行中：跟随手指实时移动，取消过渡
hammer.on('panmove', (e) => {
  slider.style.transition = 'none';
  dragX = e.deltaX;
  slider.style.transform = `translateX(${dragX - index * wrapWidth}px)`;
});

// 松手结束拖拽：判断距离，达标翻页，不足回弹原位
hammer.on('panend', () => {
  slider.style.transition = 'transform 0.6s ease';
  // 向左拖拽距离达标 → 下一页
  if (dragX < -dragThreshold) {
    index = (index + 1) % total;
  }
  // 向右拖拽距离达标 → 上一页
  else if (dragX > dragThreshold) {
    index = (index - 1 + total) % total;
  }
  // 不满足拖拽距离，回弹当前页位置
  dragX = 0;
  changeSlide();
});

// 左右快速轻扫直接翻页
hammer.on('swipeleft', () => {
  index = (index + 1) % total;
  changeSlide();
});
hammer.on('swiperight', () => {
  index = (index - 1 + total) % total;
  changeSlide();
});

// ====== 鼠标爱心拖尾代码 ======
const heartOpt = { size: 14, color: '#ff69b4', fade: 0.7, max: 90 };
let heartsArr = [];
let mx = 0, my = 0;

document.addEventListener('mousemove', e => {
  mx = e.clientX;
  my = e.clientY;
  createHeart();
});

// 创建爱心
function createHeart() {
  const h = document.createElement('div');
  h.className = 'heart';
  h.innerText = '❤️';
  h.style.fontSize = heartOpt.size + 'px';
  h.style.left = mx + 'px';
  h.style.top = my + 'px';
  document.body.appendChild(h);
  heartsArr.push(h);
  if (heartsArr.length > heartOpt.max) delHeart(heartsArr.shift());
}
// 爱心淡出删除
function delHeart(el) {
  el.style.opacity = 0;
  setTimeout(() => el.remove(), heartOpt.fade * 1000);
}
// 爱心持续上浮
setInterval(() => {
  heartsArr.forEach(item => {
    item.style.top = parseFloat(item.style.top) - 0.9 + 'px';
  });
}, 30);
</script>
</body>
</html>
