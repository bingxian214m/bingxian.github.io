<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>播放器</title>
    <style>
        /* 全局样式：黑色背景，隐藏滚动条，居中布局 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            background-color: #000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: "Microsoft YaHei", sans-serif;
        }

        /* 播放器容器样式 */
        .player-box {
            text-align: center;
            z-index: 10; /* 保证播放器在爱心上层 */
        }
        .title {
            color: #ff69b4;
            font-size: 28px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px #ff69b4;
        }

        /* 音频播放器自定义样式 */
        audio {
            width: 350px;
            height: 50px;
            outline: none;
            filter: drop-shadow(0 0 10px #ff69b4);
        }
        /* 适配浏览器播放器颜色 */
        audio::-webkit-media-controls-panel {
            background-color: #222;
        }
        audio::-webkit-media-controls-current-time-display,
        audio::-webkit-media-controls-time-remaining-display {
            color: #ff69b4;
        }
    </style>
</head>

<body>
    <!-- 播放器主体 -->
    <div class="player-box">
        <h2 class="title">💖 播放器</h2>
        <!-- 支持替换为自己的音乐链接 / 本地音乐 -->
        <audio controls autoplay loop>
            <source src="http://music.163.com/song/media/outer/url?id=1811941177.mp3" type="audio/mpeg">
            您的浏览器不支持音频播放
        </audio>
    </div>

    <!-- 鼠标心形拖尾 JS -->
    <script>
        // 配置爱心参数
        const heartSettings = {
            size: 10,        // 爱心大小
            color: '#ff69b4',// 爱心颜色（粉色）
            fadeSpeed: 0.5,  // 消失速度
            maxCount: 80     // 最大爱心数量
        };

        let hearts = [];
        let mouseX = 0, mouseY = 0;

        // 监听鼠标移动
        document.addEventListener('mousemove', (e) => {
            mouseX = e.pageX;
            mouseY = e.pageY;
            addHeart();
        });

        // 创建爱心元素
        function addHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.style.cssText = `
                position: absolute;
                left: ${mouseX - heartSettings.size/2}px;
                top: ${mouseY - heartSettings.size/2}px;
                font-size: ${heartSettings.size}px;
                color: ${heartSettings.color};
                pointer-events: none;
                user-select: none;
                transition: opacity ${heartSettings.fadeSpeed}s linear;
                z-index: 1;
            `;
            document.body.appendChild(heart);
            hearts.push(heart);

            // 限制数量，自动清理旧爱心
            if (hearts.length > heartSettings.maxCount) {
                removeHeart(hearts.shift());
            }
        }

        // 爱心淡出并删除
        function removeHeart(heart) {
            heart.style.opacity = '0';
            setTimeout(() => heart.remove(), heartSettings.fadeSpeed * 1000);
        }

        // 自动动画渲染
        setInterval(() => {
            hearts.forEach((h, i) => {
                h.style.top = `${parseInt(h.style.top) - 0.8}px`;
            });
        }, 30);
    </script>
</body>
</html>
