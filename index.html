<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>相册</title>
  <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-user-drag: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    body {
      background: #000;
      min-height: 100vh;
      overflow: hidden;
    }

    .audio-wrap {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 999;
    }

    audio {
      width: 180px;
      filter: drop-shadow(0 0 8px #ff69b4);
    }

    audio::-webkit-media-controls-panel {
      background: #222;
    }

    audio::-webkit-media-controls-current-time-display,
    audio::-webkit-media-controls-time-remaining-display {
      color: #ff69b4;
    }

    .album-box {
      width: 92%;
      max-width: 700px;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      overflow: hidden;
      border: 2px solid #ff69b4;
      border-radius: 12px;
      box-shadow: 0 0 25px #ff69b455;
      cursor: grab;
    }

    .album-box:active {
      cursor: grabbing;
    }

    .img-list {
      display: flex;
      transition: transform 0.4s ease;
    }

    /* 基础图片样式 - 动态控制交互性 */
    .img-list img {
      width: 100%;
      flex-shrink: 0;
      display: block;
      object-fit: cover;
      draggable: false;
    }

    /* PC端专用：彻底禁止图片交互 */
    .img-pc {
      pointer-events: none;
    }

    /* 移动端专用：允许长按保存 */
    .img-mobile {
      pointer-events: auto;
      -webkit-touch-callout: default;
      user-select: auto;
    }

    .prev, .next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: #ff69b488;
      color: #fff;
      border: none;
      font-size: 26px;
      padding: 8px 12px;
      cursor: pointer;
      z-index: 10;
    }

    .prev {left: 6px;}
    .next {right: 6px;}

    .heart {
      position: absolute;
      pointer-events: none;
      user-select: none;
      color: #ff69b4;
      z-index: 1;
    }
  </style>
</head>

      <img src="https://picsum.photos/id/96/800/500" alt="相册">
    </div>
  </div>

<script>
// ===================== 设备检测与适配（核心功能） =====================
const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
const images = document.querySelectorAll('.img-list img');

// 根据设备类型设置图片交互属性
function setupImageInteraction() {
  images.forEach(img => {
    if (isMobile) {
      // 移动端：允许长按保存
      img.classList.add('img-mobile');
      img.classList.remove('img-pc');
      img.removeEventListener('contextmenu', preventContextMenu);
      img.removeEventListener('dragstart', preventDrag);
    } else {
      // PC端：禁止拖拽和右键
      img.classList.add('img-pc');
      img.classList.remove('img-mobile');
      img.addEventListener('contextmenu', preventContextMenu);
      img.addEventListener('dragstart', preventDrag);
    }
  });
}

// 辅助函数
function preventContextMenu(e) { e.preventDefault(); }
function preventDrag(e) { e.preventDefault(); }

// 初始化设备适配
setupImageInteraction();

// ===================== 核心功能：轮播与拖拽 =====================
const slider = document.getElementById('slider');
const prev = document.querySelector('.prev');
const next = document.querySelector('.next');
let index = 0;
const total = images.length;
let imgWidth = slider.parentElement.offsetWidth;

// 窗口大小变化处理
window.addEventListener('resize', () => {
  imgWidth = slider.parentElement.offsetWidth;
  goSlide();
});
imgWidth = slider.parentElement.offsetWidth;

// 轮播切换
function goSlide() {
  slider.style.transition = 'transform 0.4s ease';
  slider.style.transform = `translateX(-${index * imgWidth}px)`;
}

// 按钮切换
next.onclick = () => { index = (index + 1) % total; goSlide(); };
prev.onclick = () => { index = (index - 1 + total) % total; goSlide(); };

// 自动轮播
setInterval(() => { index = (index + 1) % total; goSlide(); }, 5000);

// 拖拽滑动逻辑（仅PC端和移动端拖拽容器，不拖拽图片）
const hammer = new Hammer(slider.parentElement);
hammer.get('pan').set({ direction: Hammer.DIRECTION_HORIZONTAL });
let startX = 0;

hammer.on('panstart', (e) => {
  startX = e.center.x;
  slider.style.transition = 'none';
  e.preventDefault();
});

hammer.on('panmove', (e) => {
  const moveX = e.center.x - startX;
  const offset = Math.max(Math.min(moveX, imgWidth * 0.5), -imgWidth * 0.5);
  slider.style.transform = `translateX(${-index * imgWidth + offset}px)`;
  e.preventDefault();
});

hammer.on('panend', (e) => {
  const moveX = e.center.x - startX;
  const threshold = imgWidth * 0.25;

  if (moveX < -threshold) index = (index + 1) % total;
  else if (moveX > threshold) index = (index - 1 + total) % total;
  
  goSlide();
  e.preventDefault();
});

// ===================== 爱心拖尾 =====================
const heartOpt = { size:14, color:'#ff69b4', fade:0.7, max:90 };
let heartsArr = [];
let mx=0, my=0;

document.addEventListener('mousemove', e=>{
  mx = e.clientX;
  my = e.clientY;
  createHeart();
});

function createHeart(){
  const h = document.createElement('div');
  h.className = 'heart';
  h.innerText = '❤️';
  h.style.fontSize = heartOpt.size+'px';
  h.style.left = mx+'px';
  h.style.top = my+'px';
  document.body.appendChild(h);
  heartsArr.push(h);
  if(heartsArr.length>heartOpt.max) delHeart(heartsArr.shift());
}

function delHeart(el){
  el.style.opacity = 0;
  setTimeout(()=>el.remove(), heartOpt.fade*1000);
}

setInterval(()=>{
  heartsArr.forEach(item=>{
    item.style.top = parseFloat(item.style.top)-0.9+'px';
  });
},30);

// ===================== 全局拖拽拦截（PC端安全网） =====================
if (!isMobile) {
  document.ondragstart = function () { return false; };
  document.onselectstart = function () { return false; };
  window.addEventListener('dragstart', (e) => e.preventDefault());
}
</script>
</body>
</html>
